<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mark Attendance — Live</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: #0d1117;
      color: #f8fafc;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Full-height flex layout ── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ── */
    .top-bar {
      background: linear-gradient(90deg, #161b22, #1d2d50);
      padding: .6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .top-bar h4 {
      font-size: .95rem;
      font-weight: 700;
      color: #f0f6fc;
      margin: 0;
    }

    .clock {
      font-size: 1.1rem;
      font-weight: 700;
      color: #58a6ff;
      font-variant-numeric: tabular-nums;
    }

    /* ── Main content — fills remaining height ── */
    .main-content {
      flex: 1;
      display: flex;
      min-height: 0;
      /* allow shrinking */
    }

    /* ── Camera column — takes all remaining width ── */
    .cam-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: .75rem;
      gap: .6rem;
      min-width: 0;
    }

    /* ── Camera container fills available height ── */
    .cam-wrap {
      flex: 1;
      position: relative;
      background: #161b22;
      border-radius: 12px;
      border: 2px solid #21262d;
      overflow: hidden;
      min-height: 0;
    }

    #markVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      object-fit: contain;
    }

    #markCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Status bar ── */
    #markStatus {
      padding: .45rem 1rem;
      background: #161b22;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
      font-size: .82rem;
      color: #8b949e;
      transition: border-color .3s, color .3s;
      flex-shrink: 0;
    }

    #markStatus.live {
      border-color: #22c55e;
      color: #86efac;
    }

    #markStatus.warn {
      border-color: #f59e0b;
      color: #fde68a;
    }

    #markStatus.err {
      border-color: #ef4444;
      color: #fca5a5;
    }

    /* ── Counters + controls row ── */
    .bottom-row {
      display: flex;
      gap: .6rem;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .stat-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 9px;
      padding: .35rem .75rem;
      text-align: center;
      min-width: 70px;
    }

    .stat-box .num {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-box .lbl {
      font-size: .62rem;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: .7px;
    }

    .s-green .num {
      color: #3fb950;
    }

    .s-amber .num {
      color: #d29922;
    }

    .s-red .num {
      color: #f85149;
    }

    .ctrl-group {
      display: flex;
      gap: .5rem;
      margin-left: auto;
    }

    .ctrl-group .btn {
      border-radius: 8px;
      font-weight: 600;
      font-size: .82rem;
      padding: .4rem 1rem;
    }

    /* ── Side panel ── */
    .side-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #161b22;
      border-left: 1px solid #21262d;
      padding: .75rem;
      gap: .5rem;
    }

    .side-panel h6 {
      font-size: .7rem;
      font-weight: 700;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
      flex-shrink: 0;
    }

    #recognizedList {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    #recognizedList::-webkit-scrollbar {
      width: 4px;
    }

    #recognizedList::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 2px;
    }

    .rec-item {
      padding: .55rem .75rem;
      border-radius: 8px;
      font-size: .78rem;
      line-height: 1.45;
      animation: slideIn .3s ease;
    }

    .rec-marked {
      background: rgba(63, 185, 80, .12);
      border: 1px solid rgba(63, 185, 80, .25);
      color: #7ee787;
    }

    .rec-already {
      background: rgba(210, 153, 34, .12);
      border: 1px solid rgba(210, 153, 34, .25);
      color: #f0c040;
    }

    .rec-unknown {
      background: rgba(248, 81, 73, .12);
      border: 1px solid rgba(248, 81, 73, .25);
      color: #ff7b72;
    }

    @keyframes slideIn {
      from {
        transform: translateX(12px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ── Toast overlay ── */
    #toastContainer {
      position: fixed;
      top: 70px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      pointer-events: none;
    }

    .att-toast {
      width: 300px;
      border-radius: 12px;
      padding: .9rem 1.1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .6);
      animation: toastIn .4s cubic-bezier(.16, 1, .3, 1);
      pointer-events: none;
    }

    .toast-marked {
      background: linear-gradient(135deg, #0d4429, #114d2c);
      border: 1px solid #2ea043;
    }

    .toast-already {
      background: linear-gradient(135deg, #3d2400, #4d3000);
      border: 1px solid #9e6a03;
    }

    .toast-unknown {
      background: linear-gradient(135deg, #3d0000, #4a1010);
      border: 1px solid #da3633;
    }

    .toast-title {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: .7;
      margin-bottom: .15rem;
    }

    .toast-name {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f6fc;
    }

    .toast-sub {
      font-size: .75rem;
      opacity: .75;
      color: #c9d1d9;
      margin-top: .1rem;
    }

    @keyframes toastIn {
      from {
        transform: translateX(110%);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        max-height: 200px;
      }

      to {
        opacity: 0;
        max-height: 0;
        margin: 0;
        padding: 0;
      }
    }

    .toast-hide {
      animation: toastOut .35s ease forwards;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <div class="page-wrap">

    <!-- Top bar -->
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <a href="{{ '/' if current_user and current_user.role == 'admin' else '/logout' }}"
          class="btn btn-sm btn-outline-secondary" style="border-radius:7px;color:#8b949e;border-color:#30363d;">←
          Back</a>
        <h4>🎓 Attendance Marking — Live Recognition</h4>
      </div>
      <div style="display:flex;align-items:center;gap:1rem">
        {% if current_user %}<span style="font-size:.75rem;color:#8b949e">👤 {{ current_user.name }}</span>{% endif %}
        <div class="logout-link"><a href="/logout" style="font-size:.73rem;color:#f87171;text-decoration:none">🔓
            Logout</a></div>
        <div class="clock" id="liveClock">--:--:--</div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <!-- Main layout -->
    <div class="main-content">

      <!-- Camera column -->
      <div class="cam-col">

        <!-- Camera view — fills available space -->
        <div class="cam-wrap">
          <video id="markVideo" autoplay muted playsinline></video>
          <canvas id="markCanvas"></canvas>
        </div>

        <!-- Status -->
        <div id="markStatus">Waiting… Click <strong>▶ Start</strong> to begin.</div>

        <!-- Counters + Controls -->
        <div class="bottom-row">
          <div class="stat-box s-green">
            <div class="num" id="cntMarked">0</div>
            <div class="lbl">✅ Marked</div>
          </div>
          <div class="stat-box s-amber">
            <div class="num" id="cntAlready">0</div>
            <div class="lbl">⚠ Already</div>
          </div>
          <div class="stat-box s-red">
            <div class="num" id="cntUnknown">0</div>
            <div class="lbl">❓ Unknown</div>
          </div>
          <div class="ctrl-group">
            <button id="quickToggleBtn" class="btn btn-warning"
              title="Toggle between Quick (instant recognition) and Secure (blink to confirm) modes">⚡ Quick
              Mode</button>
            <button id="startMarkBtn" class="btn btn-primary">▶ Start</button>
            <button id="stopMarkBtn" class="btn btn-danger" disabled>■ Stop</button>
            <a href="/attendance_record?period=daily" class="btn btn-outline-secondary"
              style="color:#8b949e;border-color:#30363d;">Records</a>
          </div>
        </div>

      </div>

      <!-- Side panel -->
      <div class="side-panel">
        <h6>Session Log</h6>
        <ul id="recognizedList">
          <li style="color:#484f58;font-size:.78rem;padding:1.5rem .5rem;text-align:center;">No recognitions yet.</li>
        </ul>
      </div>

    </div>
  </div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    // Live clock
    function tick() {
      document.getElementById('liveClock').textContent =
        new Date().toLocaleTimeString('en-IN', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(tick, 1000); tick();

    // Session counters
    window.sessionCounters = { marked: 0, already: 0, unknown: 0 };
    window.bumpCounter = function (type) {
      window.sessionCounters[type]++;
      document.getElementById('cntMarked').textContent = window.sessionCounters.marked;
      document.getElementById('cntAlready').textContent = window.sessionCounters.already;
      document.getElementById('cntUnknown').textContent = window.sessionCounters.unknown;
    };

    // Toast
    window.showAttToast = function (type, name, roll, sub) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      const clsMap = { marked: 'toast-marked', already: 'toast-already', unknown: 'toast-unknown' };
      const titleMap = { marked: '✅ Attendance Marked', already: '⚠️ Already Marked Today', unknown: '❌ Not Enrolled' };
      t.className = `att-toast ${clsMap[type]}`;
      t.innerHTML = `<div class="toast-title">${titleMap[type]}</div>
      <div class="toast-name">${name || 'Unknown'}</div>
      <div class="toast-sub">${sub || ''}</div>`;
      c.appendChild(t);
      setTimeout(() => { t.classList.add('toast-hide'); setTimeout(() => t.remove(), 380); }, 4000);
    };

    // Session log
    window.appendSessionItem = function (cls, html) {
      const list = document.getElementById('recognizedList');
      const placeholder = list.querySelector('li[style]');
      if (placeholder) placeholder.remove();
      const li = document.createElement('li');
      li.className = `rec-item ${cls}`;
      li.innerHTML = html;
      list.prepend(li);
    };

    // Status bar
    window.setMarkStatus = function (text, mood) {
      const el = document.getElementById('markStatus');
      el.innerHTML = text;
      el.className = mood || '';
    };
  </script>

  <script src="{{ url_for('static', filename='js/camera_mark.js') }}"></script>
</body>

</html>
