<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add New Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #020617;
      color: #f8fafc;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .top-bar {
      background: linear-gradient(90deg, #1e293b, #1e40af);
      padding: .8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .4);
    }

    .top-bar h4 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .page {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Form card */
    .form-card {
      background: #0f172a;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }

    .form-card h5 {
      font-size: .85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .form-control-dark {
      background: #020617;
      border: 1px solid #e2e8f0;
      color: #f8fafc;
      border-radius: 9px;
      padding: .5rem .9rem;
      font-size: .9rem;
      width: 100%;
      outline: none;
      transition: .2s;
    }

    .form-control-dark:focus {
      border-color: #3b82f6;
      background: #020617;
      color: #f8fafc;
      box-shadow: none;
    }

    .form-control-dark::placeholder {
      color: #475569;
    }

    label {
      font-size: .75rem;
      color: #64748b;
      margin-bottom: .3rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    /* Camera card */
    .cam-card {
      background: #0f172a;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 1.5rem;
      text-align: center;
    }

    #video {
      border-radius: 12px;
      border: 2px solid #334155;
      width: 100%;
      max-width: 520px;
      display: block;
      margin: 0 auto;
      background: #020617;
    }

    /* Buttons */
    .btn-custom {
      border-radius: 9px;
      font-weight: 600;
      padding: .5rem 1.25rem;
      font-size: .875rem;
    }

    /* Progress */
    .prog-wrap {
      margin-top: .75rem;
    }

    .prog-bar-bg {
      background: #020617;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .prog-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 6px;
      transition: width .3s ease;
    }

    #captureStatus {
      font-size: .82rem;
      color: #475569;
      margin-top: .4rem;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
    }

    .step {
      flex: 1;
      padding: .5rem;
      text-align: center;
      font-size: .75rem;
      font-weight: 600;
      color: #475569;
      border-bottom: 3px solid #334155;
    }

    .step.active {
      color: #60a5fa;
      border-color: #3b82f6;
    }

    .step.done {
      color: #4ade80;
      border-color: #22c55e;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:.75rem;">
      <a href="/" class="btn btn-sm btn-outline-light" style="border-radius:7px;">← Back</a>
      <h4>➕ Register New Student</h4>
    </div>
  </div>

  <div class="page">

    <!-- Step indicator -->
    <div class="steps">
      <div class="step active" id="step1Label">① Enter Details</div>
      <div class="step" id="step2Label">② Capture Photos</div>
      <div class="step" id="step3Label">③ Done</div>
    </div>

    <!-- Step 1: Info form -->
    <div class="form-card" id="infoCard">
      <h5>Student Information</h5>
      <form id="studentForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label>Full Name *</label>
            <input class="form-control-dark" name="name" placeholder="e.g. Rahul Sharma" required>
          </div>
          <div class="col-md-3">
            <label>Roll Number</label>
            <input class="form-control-dark" name="roll" placeholder="e.g. 21CS001">
          </div>
          <div class="col-md-3">
            <label>Class</label>
            <input class="form-control-dark" name="class" placeholder="e.g. CSE-3">
          </div>
          <div class="col-md-3">
            <label>Section</label>
            <input class="form-control-dark" name="sec" placeholder="e.g. A">
          </div>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button id="saveInfoBtn" type="submit" class="btn btn-primary btn-custom">Save Info</button>
          <button id="startCaptureBtn" type="button" class="btn btn-warning btn-custom" disabled>📷 Start Capture (50
            photos)</button>
          <button id="addStudentBtn" type="button" class="btn btn-success btn-custom" disabled>✅ Finish</button>
        </div>
      </form>
    </div>

    <!-- Step 2: Camera -->
    <div class="cam-card">
      <video id="video" autoplay muted playsinline></video>
      <div class="prog-wrap">
        <div id="captureStatus">Captured 0 / 50</div>
        <div class="prog-bar-bg mt-1">
          <div class="prog-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const saveInfoBtn = document.getElementById("saveInfoBtn");
    const startCaptureBtn = document.getElementById("startCaptureBtn");
    const addStudentBtn = document.getElementById("addStudentBtn");
    const video = document.getElementById("video");
    const captureStatus = document.getElementById("captureStatus");
    const progressBar = document.getElementById("progressBar");

    let student_id = null, studentRoll = null, captured = 0, images = [], stream = null;
    const maxImages = 50;
    const DUPLICATE_CHECK_AT = 5; // number of frames captured before running dup check

    // Step indicators
    function setStep(n) {
      ['step1Label', 'step2Label', 'step3Label'].forEach((id, i) => {
        const el = document.getElementById(id);
        if (i + 1 < n) el.className = 'step done';
        else if (i + 1 === n) el.className = 'step active';
        else el.className = 'step';
      });
    }

    document.getElementById("studentForm").addEventListener("submit", async e => {
      e.preventDefault();
      saveInfoBtn.disabled = true;
      saveInfoBtn.textContent = 'Saving…';
      const fd = new FormData(e.target);
      const res = await fetch("/add_student", { method: "POST", body: fd });
      const j = await res.json();
      if (!res.ok) { alert("Error: " + (j.error || "Failed")); saveInfoBtn.disabled = false; saveInfoBtn.textContent = 'Save Info'; return; }
      student_id = j.student_id;
      studentRoll = j.roll;
      alert("✅ Student info saved! Now click 'Start Capture'.");
      startCaptureBtn.disabled = false;
      saveInfoBtn.textContent = '✅ Saved';
      setStep(2);
    });

    startCaptureBtn.addEventListener("click", async () => {
      startCaptureBtn.disabled = true;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await video.play();
        captureImagesLoop();
      } catch (err) {
        alert("Camera error: " + err.message);
        startCaptureBtn.disabled = false;
      }
    });

    // ── Show a styled duplicate-found warning inside the capture card ────────
    function showDuplicateError(matched, similarity) {
      captureStatus.innerHTML =
        `<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:.9rem 1rem;margin-top:.5rem;text-align:left;">
          <div style="font-size:.85rem;font-weight:700;color:#f87171;margin-bottom:.4rem;">🚫 Duplicate Candidate Detected!</div>
          <div style="font-size:.8rem;color:#fca5a5;line-height:1.6;">
            This face already belongs to a registered student:<br>
            <strong style="color:#f8fafc;">${matched.name}</strong>
            ${matched.roll ? `&nbsp;(Roll: <strong>${matched.roll}</strong>)` : ''}
            ${matched.class ? `&nbsp;| Class: ${matched.class}` : ''}
            ${matched.section ? `-${matched.section}` : ''}<br>
            <span style="color: #475569;font-size:.75rem;">Face similarity: ${similarity}%</span>
          </div>
          <div style="font-size:.75rem;color:#64748b;margin-top:.6rem;">The partially created record has been removed. Please close this page.</div>
        </div>`;
      progressBar.style.background = '#ef4444';
      progressBar.style.width = '100%';
    }

    // ── Check one frame for duplicate ─────────────────────────────────────
    async function checkDuplicate(blob) {
      const dupForm = new FormData();
      dupForm.append("image", blob, "check.jpg");
      const dupRes = await fetch("/check_face_duplicate", { method: "POST", body: dupForm });
      return await dupRes.json();
    }



    async function captureImagesLoop() {
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext("2d");

      captureStatus.innerText = "🔍 Checking for duplicates first...";
      await new Promise(r => setTimeout(r, 500)); // wait for camera exposure to adjust

      try {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const checkBlob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.92));
        const dupData = await checkDuplicate(checkBlob);

        if (dupData.duplicate) {
          if (stream) stream.getTracks().forEach(t => t.stop());
          if (student_id) {
            await fetch(`/cancel_student/${student_id}`, { method: "DELETE" });
            student_id = null;
          }
          showDuplicateError(dupData.matched_student, dupData.similarity);
          startCaptureBtn.disabled = false;
          saveInfoBtn.disabled = false;
          saveInfoBtn.textContent = 'Save Info';
          setStep(1);
          return;
        }
      } catch (err) {
        console.warn("Duplicate check network error, continuing:", err);
      }

      while (captured < maxImages) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.92));
        images.push(blob);
        captured++;

        captureStatus.innerText = `Captured ${captured} / ${maxImages}`;
        progressBar.style.width = `${(captured / maxImages) * 100}%`;
        await new Promise(r => setTimeout(r, 200));
      }


      // ── Upload all images ────────────────────────────────────────────────
      captureStatus.innerText = "Uploading images…";
      const form = new FormData();
      form.append("student_id", student_id);
      images.forEach((b, i) => form.append("images[]", b, `img_${i}.jpg`));
      const resp = await fetch("/upload_face", { method: "POST", body: form });
      if (resp.ok) {
        captureStatus.innerText = "✅ All 50 photos uploaded!";
        addStudentBtn.disabled = false;
        setStep(3);
      } else {
        const t = await resp.text();
        captureStatus.innerText = "Upload failed: " + t;
      }
      if (stream) stream.getTracks().forEach(t => t.stop());
    }

    addStudentBtn.addEventListener("click", () => {
      alert("🎉 Student registered successfully!");
      window.location.href = "/";
    });
  </script>
</body>

</html>
