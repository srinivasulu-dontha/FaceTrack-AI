<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .top-bar {
            background: linear-gradient(90deg, #1e293b, #1e40af);
            padding: .85rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .4);
        }

        .top-bar h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .page {
            padding: 1.75rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .tbl-wrap {
            background: #0f172a;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .875rem;
        }

        thead th {
            background: #020617;
            padding: .75rem 1rem;
            color: #64748b;
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .7px;
            border-bottom: 1px solid #334155;
        }

        tbody tr {
            border-bottom: 1px solid rgba(51, 65, 85, .4);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, .05);
        }

        tbody td {
            padding: .65rem 1rem;
            color: #e2e8f0;
        }

        .action-badge {
            padding: .2rem .55rem;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 600;
            background: rgba(99, 102, 241, .12);
            color: #c4b5fd;
        }

        .no-record {
            text-align: center;
            padding: 3rem;
            color: #475569;
        }
    </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:.75rem;">
            <a href="/settings" class="btn btn-sm btn-outline-light" style="border-radius:7px;">← Settings</a>
            <h4>📋 Audit Log</h4>
        </div>
        <span style="font-size:.8rem;color: #475569;">Last 200 actions</span>
    </div>
    <div class="page">
        <div class="tbl-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Action</th>
                        <th>Details</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td><span class="action-badge">{{ log[1] }}</span></td>
                        <td style="color: #475569;font-size:.82rem;">{{ log[2] }}</td>
                        <td style="color:#64748b;font-size:.8rem;">{{ log[3][:16].replace('T',' ') if log[3] else '—' }}
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="no-record">No audit records yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
