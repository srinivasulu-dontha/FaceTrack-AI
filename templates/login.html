<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — FaceTrack AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59, 130, 246, .22) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      animation: float1 8s ease-in-out infinite
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(168, 85, 247, .18) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: float2 10s ease-in-out infinite
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(40px, 30px)
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-30px, -20px)
      }
    }

    .card {
      background: rgba(30, 41, 59, .9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, .2);
      border-radius: 22px;
      padding: 2.5rem 2.25rem;
      width: 400px;
      max-width: 95vw;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .5);
      position: relative;
      z-index: 1
    }

    /* Brand */
    .brand-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.2rem;
      box-shadow: 0 8px 24px rgba(99, 102, 241, .4)
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 800;
      color: #f8fafc;
      text-align: center;
      margin-bottom: .3rem
    }

    .sub {
      text-align: center;
      color: #64748b;
      font-size: .82rem;
      margin-bottom: 1.75rem
    }

    /* Form */
    .fg {
      margin-bottom: 1rem
    }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: .4rem
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: .7rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .15)
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: opacity .2s, transform .15s;
      font-family: inherit
    }

    .btn-login:hover {
      opacity: .92;
      transform: translateY(-1px)
    }

    .btn-login:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    .err {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .3);
      color: #fca5a5;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .82rem;
      margin-bottom: 1rem;
      display: none
    }

    .warn {
      background: rgba(245, 158, 11, .12);
      border: 1px solid rgba(245, 158, 11, .3);
      color: #fde68a;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .82rem;
      margin-bottom: 1rem;
      display: none
    }

    .hint {
      text-align: center;
      color: #475569;
      font-size: .75rem;
      margin-top: 1rem
    }

    /* Role badge */
    .role-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      background: #0f172a;
      padding: .35rem;
      border-radius: 10px
    }

    .role-tab {
      flex: 1;
      padding: .45rem;
      text-align: center;
      border-radius: 7px;
      font-size: .78rem;
      font-weight: 600;
      color: #64748b;
      cursor: default
    }

    .role-tab.active-admin {
      background: linear-gradient(135deg, #1d4ed8, #4338ca);
      color: #fff
    }

    .role-tab.active-staff {
      background: linear-gradient(135deg, #0d9488, #0891b2);
      color: #fff
    }
  </style>
</head>

<body>
  <div class="card" id="loginCard">
    <div class="brand-icon">🎓</div>
    <h1>FaceTrack AI</h1>
    <p class="sub">Attendance Management System</p>

    <div id="errBox" class="err"></div>
    <div id="warnBox" class="warn"></div>

    <div class="fg">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus>
    </div>
    <div class="fg">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">🔓 Sign In</button>
  </div>

  <script>
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errBox = document.getElementById('errBox');
    const warnBox = document.getElementById('warnBox');

    function showErr(msg) { errBox.textContent = msg; errBox.style.display = ''; warnBox.style.display = 'none'; }
    function showWarn(msg) { warnBox.textContent = msg; warnBox.style.display = ''; errBox.style.display = 'none'; }
    function clearMsgs() { errBox.style.display = 'none'; warnBox.style.display = 'none'; }

    // Allow Enter key
    [usernameEl, passwordEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));

    async function doLogin() {
      clearMsgs();
      const username = usernameEl.value.trim();
      const password = passwordEl.value.trim();
      if (!username || !password) { showErr('Please enter username and password.'); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = '⏳ Signing in…';
      try {
        const fd = new FormData();
        fd.append('username', username);
        fd.append('password', password);
        const res = await fetch('/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || data.error) { showErr(data.error || 'Login failed.'); loginBtn.disabled = false; loginBtn.textContent = '🔓 Sign In'; return; }
        if (data.role === 'admin') {
          loginBtn.textContent = '✅ Redirecting…';
          window.location.href = data.redirect;
        } else if (data.face_required) {
          // Staff — needs face scan
          loginBtn.textContent = '📷 Opening Face Verify…';
          window.location.href = '/staff_face_login';
        }
      } catch (e) { showErr('Network error. Is the server running?'); loginBtn.disabled = false; loginBtn.textContent = '🔓 Sign In'; }
    }
  </script>
</body>

</html>
